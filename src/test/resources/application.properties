# ===================================================
# Test Configuration - H2 In-Memory Database
# ===================================================

# H2 datasource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# App token for JWT (test value)
app.token=lqpMba6eokOKH59DrXTGSLy4jtIYWnmQUuJ1fCPw7dAx30FBgzEshRic2ZV8vN

# DataInitializer env vars (test defaults)
APP_USER=test_admin
APP_PASSWORD=test_password

# Disable dotenv in tests to avoid requiring .env file
spring.config.import=optional:dotenv:.env
